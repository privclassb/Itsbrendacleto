<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Agenda | itsbrendacleto</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #FAF7F2; --sand: #EDE8DF; --brown: #5C4033; --brown-light: #8B6355; --mint: #A8C5B5; --rose: #E8A598; --text: #2C1F1A; --muted: #7A6560; --white: #FFFFFF; --radius: 16px; --shadow: 0 2px 16px rgba(92,64,51,0.08); }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; }

    header { background: var(--brown); padding: 16px 28px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
    .btn-back { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--white); text-decoration: none; transition: all 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.25); }
    .header-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--white); font-weight: 400; }

    .hero { background: var(--white); border-bottom: 1px solid var(--sand); padding: 32px 28px; }
    .hero-inner { max-width: 680px; margin: 0 auto; }
    .hero-label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
    .hero-title { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--text); font-weight: 400; }

    main { max-width: 680px; margin: 0 auto; padding: 28px 20px 60px; }

    .section-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); font-weight: 400; margin-bottom: 14px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow); margin-bottom: 28px; }

    .agenda-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--sand); }
    .agenda-row:last-child { border-bottom: none; }
    .agenda-date { font-weight: 700; color: var(--text); font-size: 14px; text-transform: capitalize; }
    .agenda-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .agenda-status { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 99px; flex-shrink: 0; }
    .agenda-status.pendente { background: var(--sand); color: var(--muted); }
    .agenda-status.realizada { background: #E8F8EF; color: #1E5C3A; }
    .agenda-status.cancelada, .agenda-status.cancelada_falta { background: #FFF0EE; color: #C0392B; }
    .agenda-status.reagendada { background: #FFF8E5; color: #A9740C; }
    .agenda-status.para_reagendar { background: #FFF8E5; color: #A9740C; }

    .agenda-subtitle { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 4px 0 8px; }

    .empty-msg { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }

    .agenda-toggle-btn { display: block; width: 100%; margin-top: 10px; padding: 10px; background: var(--cream); border: 1.5px solid var(--sand); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: var(--brown); cursor: pointer; text-align: center; }
    .agenda-toggle-btn:hover { border-color: var(--brown-light); }

    .history-filters { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .history-filters input[type="date"] { flex: 1; min-width: 120px; padding: 9px 10px; border: 1.5px solid var(--sand); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: var(--cream); outline: none; }
    .history-filters input[type="date"]:focus { border-color: var(--mint); }
    .history-filters input[type="date"]:disabled { opacity: 0.5; }
    .btn-filter { padding: 9px 16px; background: var(--brown); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: white; cursor: pointer; white-space: nowrap; }
    .btn-filter:hover { background: var(--brown-light); }
    .history-showall { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-bottom: 14px; cursor: pointer; }
    .history-showall input { cursor: pointer; }
  </style>
</head>
<body>

<header>
  <a href="home-adulto.html" class="btn-back">← Voltar</a>
  <div class="header-title">Minha Agenda</div>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-label">Suas aulas</div>
    <div class="hero-title">Agenda 📅</div>
  </div>
</div>

<main>
  <div class="section-title">Próximas aulas</div>
  <div class="card">
    <div id="upcomingList"><div class="empty-msg">Carregando...</div></div>
  </div>

  <div class="section-title">Histórico</div>
  <div class="card">
    <div class="history-filters">
      <input type="date" id="historyFrom" onchange="renderHistory()" />
      <input type="date" id="historyTo" onchange="renderHistory()" />
      <button class="btn-filter" onclick="renderHistory()">Buscar</button>
    </div>
    <label class="history-showall">
      <input type="checkbox" id="historyShowAll" onchange="onHistoryShowAllChange()" /> Mostrar todas
    </label>
    <div id="historyList"><div class="empty-msg">Carregando...</div></div>
  </div>

  <div class="section-title">🔄 Reposições</div>
  <div class="card">
    <div class="agenda-subtitle" id="repoPendingTitle">A repor</div>
    <div id="repoPendingList"><div class="empty-msg">Carregando...</div></div>
    <div class="agenda-subtitle" id="repoDoneTitle" style="margin-top:16px;">Já feitas</div>
    <div id="repoDoneList"><div class="empty-msg">Carregando...</div></div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://vbqumpzlxseakvmyvkem.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NjK_Rdqnl1ZCRd9LlUG-fA_OvdYsKvj';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      storage: window.localStorage,
      autoRefreshToken: true,
      detectSessionInUrl: false,
      lock: async (_name, _acquireTimeout, fn) => fn(),
    }
  });

  // ---- Modo "Ver como aluno" (Brenda) -- so leitura, nao grava nada ----
  var __previewAs = sessionStorage.getItem('__preview_as');
  if (__previewAs) {
    var __origGetSession = sb.auth.getSession.bind(sb.auth);
    sb.auth.getSession = async function () {
      var real = await __origGetSession();
      if (real && real.data && real.data.session) {
        real.data.session = Object.assign({}, real.data.session, {
          user: Object.assign({}, real.data.session.user, { id: __previewAs })
        });
      }
      return real;
    };
    var __previewNoop = function () {
      var p = new Proxy(function () {}, {
        get: function (t, prop) {
          if (prop === 'then') return function (resolve) { resolve({ data: null, error: null, count: 0 }); };
          return function () { return p; };
        }
      });
      return p;
    };
    var __origFrom = sb.from.bind(sb);
    sb.from = function (table) {
      var qb = __origFrom(table);
      ['insert', 'update', 'upsert', 'delete'].forEach(function (m) {
        qb[m] = function () { return __previewNoop(); };
      });
      return qb;
    };
    if (sb.rpc) sb.rpc = function () { return __previewNoop(); };
    var __insertPreviewBanner = function () {
      if (document.getElementById('previewModeBanner')) return;
      var banner = document.createElement('div');
      banner.id = 'previewModeBanner';
      banner.style.cssText = 'position:relative;z-index:9999;background:#2C1F1A;color:#FFEFD6;padding:9px 16px;font-size:13px;text-align:center;font-family:"DM Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;';
      var previewName = sessionStorage.getItem('__preview_name') || 'aluno';
      banner.innerHTML = '\uD83D\uDD0D Modo visualiza\u00e7\u00e3o \u2014 voc\u00ea \u00e9 a Brenda vendo como <b>' + previewName + '</b> (somente leitura, nada \u00e9 salvo) ' +
        '<button id="previewExitBtn" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);color:#fff;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;font-family:inherit;">Sair da visualiza\u00e7\u00e3o</button>';
      document.body.insertBefore(banner, document.body.firstChild);
    };
    if (document.body) { __insertPreviewBanner(); } else { document.addEventListener('DOMContentLoaded', __insertPreviewBanner); }
    document.addEventListener('click', function (e) {
      if (e.target && e.target.id === 'previewExitBtn') {
        sessionStorage.removeItem('__preview_as');
        sessionStorage.removeItem('__preview_name');
        window.location.href = 'painel-professora.html';
      }
    });
  }

  function todayLocalISO() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  const CLASS_STATUS_LABEL = {
    realizada: 'Realizada', pendente: 'Pendente', cancelada: 'Cancelada',
    cancelada_falta: 'Cancelada por falta', para_reagendar: 'Para reagendar', reagendada: 'Reagendada',
    feriado: 'Feriado', recesso: 'Recesso'
  };

  function renderRow(l) {
    const date = new Date(l.class_date + 'T00:00:00').toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
    const time = l.start_time ? l.start_time.slice(0, 5) + (l.end_time ? '–' + l.end_time.slice(0, 5) : '') : 'sem horário';
    const statusLabel = CLASS_STATUS_LABEL[l.status] || l.status;
    return `
      <div class="agenda-row">
        <div>
          <div class="agenda-date">${date}</div>
          <div class="agenda-time">${time}</div>
        </div>
        <span class="agenda-status ${l.status}">${statusLabel}</span>
      </div>`;
  }

  function renderRepoPendingRow(l) {
    const date = new Date(l.class_date + 'T00:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const time = l.start_time ? l.start_time.slice(0, 5) + (l.end_time ? '–' + l.end_time.slice(0, 5) : '') : 'sem horário';
    return `
      <div class="agenda-row">
        <div>
          <div class="agenda-date">Aula de ${date}</div>
          <div class="agenda-time">${time}</div>
        </div>
        <span class="agenda-status pendente">Aguardando reposição</span>
      </div>`;
  }

  function renderRepoDoneRow(l, all) {
    const original = all.find(o => o.id === l.makeup_for_id);
    const origDate = original ? new Date(original.class_date + 'T00:00:00').toLocaleDateString('pt-BR') : '—';
    const newDate = new Date(l.class_date + 'T00:00:00').toLocaleDateString('pt-BR');
    const time = l.start_time ? l.start_time.slice(0, 5) + (l.end_time ? '–' + l.end_time.slice(0, 5) : '') : 'sem horário';
    return `
      <div class="agenda-row">
        <div>
          <div class="agenda-date">${origDate} → ${newDate}</div>
          <div class="agenda-time">${time}</div>
        </div>
        <span class="agenda-status realizada">Reagendada</span>
      </div>`;
  }

  let upcomingCache = [];
  let upcomingExpanded = false;
  let historyCache = [];

  function renderUpcoming() {
    const upcomingEl = document.getElementById('upcomingList');
    if (upcomingCache.length === 0) {
      upcomingEl.innerHTML = '<div class="empty-msg">Nenhuma aula agendada.</div>';
      return;
    }
    const shown = upcomingExpanded ? upcomingCache : upcomingCache.slice(0, 3);
    let html = shown.map(renderRow).join('');
    if (upcomingCache.length > 3) {
      html += `<button class="agenda-toggle-btn" onclick="toggleUpcoming()">${upcomingExpanded ? 'Ver menos' : 'Ver todas as próximas (' + upcomingCache.length + ')'}</button>`;
    }
    upcomingEl.innerHTML = html;
  }

  function toggleUpcoming() {
    upcomingExpanded = !upcomingExpanded;
    renderUpcoming();
  }

  function onHistoryShowAllChange() {
    const showAll = document.getElementById('historyShowAll').checked;
    document.getElementById('historyFrom').disabled = showAll;
    document.getElementById('historyTo').disabled = showAll;
    renderHistory();
  }

  function renderHistory() {
    const historyEl = document.getElementById('historyList');
    const showAll = document.getElementById('historyShowAll').checked;
    const from = document.getElementById('historyFrom').value;
    const to = document.getElementById('historyTo').value;

    let filtered;
    if (showAll) {
      filtered = historyCache;
    } else if (from || to) {
      filtered = historyCache.filter(l => (!from || l.class_date >= from) && (!to || l.class_date <= to));
    } else {
      historyEl.innerHTML = '<div class="empty-msg">Escolha um período acima ou marque "Mostrar todas" para ver o histórico.</div>';
      return;
    }

    historyEl.innerHTML = filtered.length
      ? filtered.map(renderRow).join('')
      : '<div class="empty-msg">Nenhuma aula encontrada nesse período.</div>';
  }

  async function init(session) {
    const user = session.user;
    const { data: profile } = await sb.from('profiles').select('turma_id').eq('id', user.id).maybeSingle();
    const today = todayLocalISO();

    let query = sb.from('class_logs').select('id, class_date, start_time, end_time, status, needs_makeup, makeup_for_id');
    query = profile?.turma_id
      ? query.or(`student_id.eq.${user.id},turma_id.eq.${profile.turma_id}`)
      : query.eq('student_id', user.id);

    const { data: logs } = await query.order('class_date', { ascending: false }).order('start_time', { ascending: false });
    const all = logs || [];

    upcomingCache = all.filter(l => l.class_date >= today && (l.status === 'pendente' || l.status === 'reagendada'))
      .sort((a, b) => (a.class_date + (a.start_time || '')).localeCompare(b.class_date + (b.start_time || '')));
    historyCache = all.filter(l => !(l.class_date >= today && (l.status === 'pendente' || l.status === 'reagendada')));

    renderUpcoming();
    renderHistory();

    const linkedOriginalIds = new Set(all.filter(l => l.makeup_for_id).map(l => l.makeup_for_id));
    const repoPending = all.filter(l => l.needs_makeup && !linkedOriginalIds.has(l.id));
    const repoDone = all.filter(l => l.makeup_for_id);

    document.getElementById('repoPendingTitle').textContent = `A repor (${repoPending.length})`;
    document.getElementById('repoDoneTitle').textContent = `Já feitas (${repoDone.length})`;

    document.getElementById('repoPendingList').innerHTML = repoPending.length
      ? repoPending.map(renderRepoPendingRow).join('')
      : '<div class="empty-msg">Nenhuma reposição pendente. 🎉</div>';

    document.getElementById('repoDoneList').innerHTML = repoDone.length
      ? repoDone.map(l => renderRepoDoneRow(l, all)).join('')
      : '<div class="empty-msg">Nenhuma reposição feita ainda.</div>';
  }

  (async () => {
    for (let i = 0; i < 5; i++) {
      const { data: { session } } = await sb.auth.getSession();
      if (session) { await init(session); return; }
      await new Promise(r => setTimeout(r, 400 * (i + 1)));
    }
    window.location.href = 'index.html';
  })();
</script>
</body>
</html>
