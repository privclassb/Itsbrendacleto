<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Agenda | itsbrendacleto Kids</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --rose: #F9A8C9; --mint: #7ECBA1; --lavender: #C3B1E1; --yellow: #FFD97D; --sky: #90C9F9; --cream: #FFF8F0; --text: #3D2B1F; --white: #FFFFFF; --radius: 20px; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); min-height: 100vh; }

    header { background: var(--white); padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 10; }
    .btn-back { background: var(--cream); border: 2px solid #EEE; border-radius: 12px; padding: 7px 14px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .btn-back:hover { border-color: var(--rose); }
    .header-title { font-size: 16px; font-weight: 900; color: var(--text); }

    .hero { background: linear-gradient(135deg, var(--sky), var(--lavender)); padding: 28px 24px; text-align: center; }
    .hero-icon { font-size: 48px; margin-bottom: 8px; }
    .hero-title { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
    .hero-sub { font-size: 13px; font-weight: 700; color: rgba(61,43,31,0.65); }

    main { padding: 24px 20px; max-width: 600px; margin: 0 auto; }

    .section-title { font-size: 15px; font-weight: 900; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 24px; }

    .agenda-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 2px solid var(--cream); }
    .agenda-row:last-child { border-bottom: none; }
    .agenda-date { font-weight: 800; color: var(--text); font-size: 13px; text-transform: capitalize; }
    .agenda-time { font-size: 12px; color: #AAA; font-weight: 700; margin-top: 2px; }
    .agenda-status { font-size: 11px; font-weight: 800; padding: 5px 12px; border-radius: 99px; flex-shrink: 0; }
    .agenda-status.pendente { background: #F0F0F0; color: #888; }
    .agenda-status.realizada { background: #E8F8EF; color: #1E5C3A; }
    .agenda-status.cancelada, .agenda-status.cancelada_falta { background: #FFF0EE; color: #C0392B; }
    .agenda-status.reagendada { background: #FFF8E5; color: #A9740C; }
    .agenda-status.para_reagendar { background: #FFF8E5; color: #A9740C; }

    .agenda-subtitle { font-size: 12px; font-weight: 800; color: #AAA; text-transform: uppercase; letter-spacing: 0.5px; margin: 4px 0 8px; }

    .empty-msg { text-align: center; padding: 20px; color: #AAA; font-size: 13px; font-weight: 700; }

    .agenda-toggle-btn { display: block; width: 100%; margin-top: 10px; padding: 12px; background: var(--cream); border: 2px solid #EEE; border-radius: 14px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; color: var(--text); cursor: pointer; text-align: center; }
    .agenda-toggle-btn:hover { border-color: var(--sky); }

    .history-filters { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .history-filters input[type="date"] { flex: 1; min-width: 120px; padding: 10px; border: 2px solid #EEE; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); background: var(--cream); outline: none; }
    .history-filters input[type="date"]:focus { border-color: var(--sky); }
    .history-filters input[type="date"]:disabled { opacity: 0.5; }
    .btn-filter { padding: 10px 16px; background: var(--sky); border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; color: var(--text); cursor: pointer; white-space: nowrap; }
    .btn-filter:hover { filter: brightness(0.95); }
    .history-showall { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: #AAA; margin-bottom: 14px; cursor: pointer; }
    .history-showall input { cursor: pointer; }
  </style>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5C4033" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="itsbrendacleto" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</head>
<body>

<header>
  <a href="home-kids.html" class="btn-back">← Voltar</a>
  <div class="header-title">Minha Agenda</div>
</header>

<div class="hero">
  <div class="hero-icon">📅</div>
  <div class="hero-title">Minhas aulas</div>
  <div class="hero-sub">Veja o que já rolou e o que vem por aí!</div>
</div>

<main>
  <div class="section-title">✨ Próximas aulas</div>
  <div class="card">
    <div id="upcomingList"><div class="empty-msg">Carregando...</div></div>
  </div>

  <div class="section-title">📚 Histórico</div>
  <div class="card">
    <div class="history-filters">
      <input type="date" id="historyFrom" onchange="renderHistory()" />
      <input type="date" id="historyTo" onchange="renderHistory()" />
      <button class="btn-filter" onclick="renderHistory()">Buscar</button>
    </div>
    <label class="history-showall">
      <input type="checkbox" id="historyShowAll" onchange="onHistoryShowAllChange()" /> Mostrar tudo
    </label>
    <div id="historyList"><div class="empty-msg">Carregando...</div></div>
  </div>

  <div class="section-title">🔄 Reposições</div>
  <div class="card">
    <div class="agenda-subtitle" id="repoPendingTitle">Vou repor</div>
    <div id="repoPendingList"><div class="empty-msg">Carregando...</div></div>
    <div class="agenda-subtitle" id="repoDoneTitle" style="margin-top:16px;">Já repus</div>
    <div id="repoDoneList"><div class="empty-msg">Carregando...</div></div>
  </div>
</main>

<script>
  const SUPABASE_URL = 'https://vbqumpzlxseakvmyvkem.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NjK_Rdqnl1ZCRd9LlUG-fA_OvdYsKvj';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      storage: window.localStorage,
      autoRefreshToken: true,
      detectSessionInUrl: false,
      lock: async (_name, _acquireTimeout, fn) => fn(),
    }
  });

  function todayLocalISO() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  const CLASS_STATUS_LABEL = {
    realizada: 'Feita ✓', pendente: 'Agendada', cancelada: 'Cancelada',
    cancelada_falta: 'Cancelada', para_reagendar: 'Vai remarcar', reagendada: 'Remarcada',
    feriado: 'Feriado', recesso: 'Recesso'
  };

  function renderRow(l) {
    const date = new Date(l.class_date + 'T00:00:00').toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
    const time = l.start_time ? l.start_time.slice(0, 5) + (l.end_time ? '–' + l.end_time.slice(0, 5) : '') : 'sem horário';
    const statusLabel = CLASS_STATUS_LABEL[l.status] || l.status;
    return `
      <div class="agenda-row">
        <div>
          <div class="agenda-date">${date}</div>
          <div class="agenda-time">${time}</div>
        </div>
        <span class="agenda-status ${l.status}">${statusLabel}</span>
      </div>`;
  }

  function renderRepoPendingRow(l) {
    const date = new Date(l.class_date + 'T00:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const time = l.start_time ? l.start_time.slice(0, 5) + (l.end_time ? '–' + l.end_time.slice(0, 5) : '') : 'sem horário';
    return `
      <div class="agenda-row">
        <div>
          <div class="agenda-date">Aula de ${date}</div>
          <div class="agenda-time">${time}</div>
        </div>
        <span class="agenda-status pendente">Vou repor</span>
      </div>`;
  }

  function renderRepoDoneRow(l, all) {
    const original = all.find(o => o.id === l.makeup_for_id);
    const origDate = original ? new Date(original.class_date + 'T00:00:00').toLocaleDateString('pt-BR') : '—';
    const newDate = new Date(l.class_date + 'T00:00:00').toLocaleDateString('pt-BR');
    const time = l.start_time ? l.start_time.slice(0, 5) + (l.end_time ? '–' + l.end_time.slice(0, 5) : '') : 'sem horário';
    return `
      <div class="agenda-row">
        <div>
          <div class="agenda-date">${origDate} → ${newDate}</div>
          <div class="agenda-time">${time}</div>
        </div>
        <span class="agenda-status realizada">Feita ✓</span>
      </div>`;
  }

  let upcomingCache = [];
  let upcomingExpanded = false;
  let historyCache = [];

  function renderUpcoming() {
    const upcomingEl = document.getElementById('upcomingList');
    if (upcomingCache.length === 0) {
      upcomingEl.innerHTML = '<div class="empty-msg">Nenhuma aula agendada ainda.</div>';
      return;
    }
    const shown = upcomingExpanded ? upcomingCache : upcomingCache.slice(0, 3);
    let html = shown.map(renderRow).join('');
    if (upcomingCache.length > 3) {
      html += `<button class="agenda-toggle-btn" onclick="toggleUpcoming()">${upcomingExpanded ? 'Ver menos' : 'Ver todas! (' + upcomingCache.length + ')'}</button>`;
    }
    upcomingEl.innerHTML = html;
  }

  function toggleUpcoming() {
    upcomingExpanded = !upcomingExpanded;
    renderUpcoming();
  }

  function onHistoryShowAllChange() {
    const showAll = document.getElementById('historyShowAll').checked;
    document.getElementById('historyFrom').disabled = showAll;
    document.getElementById('historyTo').disabled = showAll;
    renderHistory();
  }

  function renderHistory() {
    const historyEl = document.getElementById('historyList');
    const showAll = document.getElementById('historyShowAll').checked;
    const from = document.getElementById('historyFrom').value;
    const to = document.getElementById('historyTo').value;

    let filtered;
    if (showAll) {
      filtered = historyCache;
    } else if (from || to) {
      filtered = historyCache.filter(l => (!from || l.class_date >= from) && (!to || l.class_date <= to));
    } else {
      historyEl.innerHTML = '<div class="empty-msg">Escolha um período ou toque em "Mostrar tudo" 👆</div>';
      return;
    }

    historyEl.innerHTML = filtered.length
      ? filtered.map(renderRow).join('')
      : '<div class="empty-msg">Nada encontrado nesse período.</div>';
  }

  async function init(session) {
    const user = session.user;
    const { data: profile } = await sb.from('profiles').select('turma_id').eq('id', user.id).maybeSingle();
    const today = todayLocalISO();

    let query = sb.from('class_logs').select('id, class_date, start_time, end_time, status, needs_makeup, makeup_for_id');
    query = profile?.turma_id
      ? query.or(`student_id.eq.${user.id},turma_id.eq.${profile.turma_id}`)
      : query.eq('student_id', user.id);

    const { data: logs } = await query.order('class_date', { ascending: false }).order('start_time', { ascending: false });
    const all = logs || [];

    upcomingCache = all.filter(l => l.class_date >= today && (l.status === 'pendente' || l.status === 'reagendada'))
      .sort((a, b) => (a.class_date + (a.start_time || '')).localeCompare(b.class_date + (b.start_time || '')));
    historyCache = all.filter(l => !(l.class_date >= today && (l.status === 'pendente' || l.status === 'reagendada')));

    renderUpcoming();
    renderHistory();

    const linkedOriginalIds = new Set(all.filter(l => l.makeup_for_id).map(l => l.makeup_for_id));
    const repoPending = all.filter(l => l.needs_makeup && !linkedOriginalIds.has(l.id));
    const repoDone = all.filter(l => l.makeup_for_id);

    document.getElementById('repoPendingTitle').textContent = `Vou repor (${repoPending.length})`;
    document.getElementById('repoDoneTitle').textContent = `Já repus (${repoDone.length})`;

    document.getElementById('repoPendingList').innerHTML = repoPending.length
      ? repoPending.map(renderRepoPendingRow).join('')
      : '<div class="empty-msg">Nada pra repor! 🎉</div>';

    document.getElementById('repoDoneList').innerHTML = repoDone.length
      ? repoDone.map(l => renderRepoDoneRow(l, all)).join('')
      : '<div class="empty-msg">Nenhuma reposição ainda.</div>';
  }

  (async () => {
    for (let i = 0; i < 5; i++) {
      const { data: { session } } = await sb.auth.getSession();
      if (session) { await init(session); return; }
      await new Promise(r => setTimeout(r, 400 * (i + 1)));
    }
    window.location.href = 'index.html';
  })();
</script>
</body>
</html>
