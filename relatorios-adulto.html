<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatórios | itsbrendacleto</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #FAF7F2; --sand: #EDE8DF; --brown: #5C4033; --brown-light: #8B6355; --mint: #A8C5B5; --rose: #E8A598; --text: #2C1F1A; --muted: #7A6560; --white: #FFFFFF; --radius: 16px; --shadow: 0 2px 16px rgba(92,64,51,0.08); }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; }
    header { background: var(--brown); padding: 16px 28px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
    .btn-back { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 6px 14px; font-size: 13px; color: var(--white); text-decoration: none; }
    .header-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--white); font-weight: 400; }

    .hero { background: var(--white); border-bottom: 1px solid var(--sand); padding: 32px 28px; }
    .hero-inner { max-width: 680px; margin: 0 auto; }
    .hero-label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
    .hero-title { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); font-weight: 400; }

    main { max-width: 680px; margin: 0 auto; padding: 28px 20px; }

    .report-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      cursor: pointer;
      border: 1.5px solid var(--sand);
      transition: all 0.2s;
    }
    .report-item:hover { border-color: var(--brown-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(92,64,51,0.12); }
    .report-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 12px; }
    .report-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--text); font-weight: 400; }
    .report-period { background: var(--cream); border: 1.5px solid var(--sand); border-radius: 99px; padding: 3px 12px; font-size: 12px; font-weight: 500; color: var(--muted); white-space: nowrap; }
    .report-preview { font-size: 14px; color: var(--muted); line-height: 1.5; }
    .report-date { font-size: 12px; color: var(--sand); margin-top: 8px; }
    .new-badge { background: var(--mint); color: #1E5C3A; font-size: 10px; font-weight: 700; border-radius: 99px; padding: 2px 10px; text-transform: uppercase; letter-spacing: 0.5px; }

    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 6px; font-weight: 400; }
    .empty-sub { font-size: 14px; color: var(--muted); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 20px; padding: 32px; width: 100%; max-width: 560px; max-height: 82vh; overflow-y: auto; }
    .modal-period { display: inline-block; background: var(--cream); border: 1.5px solid var(--sand); border-radius: 99px; padding: 4px 14px; font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); font-weight: 400; margin-bottom: 20px; }
    .modal-content { font-size: 15px; color: var(--text); line-height: 1.8; white-space: pre-wrap; }
    .modal-close { margin-top: 24px; width: 100%; padding: 14px; background: var(--brown); border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; color: var(--white); cursor: pointer; }
    .modal-close:hover { background: var(--brown-light); }
  </style>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5C4033" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="itsbrendacleto" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          setInterval(function () { reg.update(); }, 60000);
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible') reg.update();
          });
        }).catch(function () {});
      });
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        var active = document.activeElement;
        var isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
        if (isTyping) {
          active.addEventListener('blur', function () { window.location.reload(); }, { once: true });
        } else {
          window.location.reload();
        }
      });
    }
  </script>
</head>
<body>

<header>
  <a href="home-adulto.html" class="btn-back">← Voltar</a>
  <div class="header-title">Relatórios</div>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-label">Seu progresso</div>
    <div class="hero-title">Relatórios & Boletins 📊</div>
  </div>
</div>

<main id="mainContent">
  <div class="empty-state">
    <div class="empty-icon">⏳</div>
    <div class="empty-title">Carregando...</div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-period" id="modalPeriod" style="display:none;"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-content" id="modalContent"></div>
    <button class="modal-close" id="modalClose">Fechar</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://vbqumpzlxseakvmyvkem.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NjK_Rdqnl1ZCRd9LlUG-fA_OvdYsKvj';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      storage: window.localStorage,
      autoRefreshToken: true,
      detectSessionInUrl: false,
      lock: async (_name, _acquireTimeout, fn) => fn(),
    }
  });

  // ---- Modo "Ver como aluno" (Brenda) -- so leitura, nao grava nada ----
  var __previewAs = sessionStorage.getItem('__preview_as');
  if (__previewAs) {
    var __origGetSession = sb.auth.getSession.bind(sb.auth);
    sb.auth.getSession = async function () {
      var real = await __origGetSession();
      if (real && real.data && real.data.session) {
        real.data.session = Object.assign({}, real.data.session, {
          user: Object.assign({}, real.data.session.user, { id: __previewAs })
        });
      }
      return real;
    };
    var __previewNoop = function () {
      var p = new Proxy(function () {}, {
        get: function (t, prop) {
          if (prop === 'then') return function (resolve) { resolve({ data: null, error: null, count: 0 }); };
          return function () { return p; };
        }
      });
      return p;
    };
    var __origFrom = sb.from.bind(sb);
    sb.from = function (table) {
      var qb = __origFrom(table);
      ['insert', 'update', 'upsert', 'delete'].forEach(function (m) {
        qb[m] = function () { return __previewNoop(); };
      });
      return qb;
    };
    if (sb.rpc) sb.rpc = function () { return __previewNoop(); };
    var __insertPreviewBanner = function () {
      if (document.getElementById('previewModeBanner')) return;
      var banner = document.createElement('div');
      banner.id = 'previewModeBanner';
      banner.style.cssText = 'position:relative;z-index:9999;background:#2C1F1A;color:#FFEFD6;padding:9px 16px;font-size:13px;text-align:center;font-family:"DM Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;';
      var previewName = sessionStorage.getItem('__preview_name') || 'aluno';
      banner.innerHTML = '\uD83D\uDD0D Modo visualiza\u00e7\u00e3o \u2014 voc\u00ea \u00e9 a Brenda vendo como <b>' + previewName + '</b> (somente leitura, nada \u00e9 salvo) ' +
        '<button id="previewExitBtn" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);color:#fff;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;font-family:inherit;">Sair da visualiza\u00e7\u00e3o</button>';
      document.body.insertBefore(banner, document.body.firstChild);
    };
    if (document.body) { __insertPreviewBanner(); } else { document.addEventListener('DOMContentLoaded', __insertPreviewBanner); }
    document.addEventListener('click', function (e) {
      if (e.target && e.target.id === 'previewExitBtn') {
        sessionStorage.removeItem('__preview_as');
        sessionStorage.removeItem('__preview_name');
        window.location.href = 'painel-professora.html';
      }
    });
  }

  async function init(session) {
    // Session already verified before init()

    const { data: reports } = await sb.from('reports')
      .select('*').eq('student_id', session.user.id).eq('is_published', true)
      .order('created_at', { ascending: false });

    // Marca quais já estavam lidos antes de marcar tudo como lido agora
    const readIds = JSON.parse(localStorage.getItem('read_reports') || '[]');
    const allIds = (reports || []).map(r => r.id);
    localStorage.setItem('read_reports', JSON.stringify([...new Set([...readIds, ...allIds])]));

    const main = document.getElementById('mainContent');

    if (!reports || reports.length === 0) {
      main.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">Nenhum relatório ainda</div>
          <div class="empty-sub">Seus relatórios aparecerão aqui quando sua professora publicar.</div>
        </div>`;
      return;
    }

    main.innerHTML = reports.map(r => {
      const date = new Date(r.created_at).toLocaleDateString('pt-BR');
      const isNew = !readIds.includes(r.id);
      return `
        <div class="report-item" onclick="openReport('${r.title}', '${r.period || ''}', \`${(r.content||'').replace(/`/g,"'")}\`)">
          <div class="report-header">
            <div class="report-title">${r.title}${isNew ? ' <span class="new-badge">Novo</span>' : ''}</div>
            ${r.period ? `<span class="report-period">${r.period}</span>` : ''}
          </div>
          <div class="report-preview">${(r.content||'').substring(0,120)}${r.content && r.content.length > 120 ? '...' : ''}</div>
          <div class="report-date">${date}</div>
        </div>`;
    }).join('');
  }

  function openReport(title, period, content) {
    const periodEl = document.getElementById('modalPeriod');
    document.getElementById('modalTitle').textContent = title;
    if (period) { periodEl.textContent = period; periodEl.style.display = 'inline-block'; }
    else { periodEl.style.display = 'none'; }
    document.getElementById('modalContent').textContent = content;
    document.getElementById('modalOverlay').classList.add('open');
  }

  document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('open'));
  document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); });

  // Auth with retry for slow session loading
  (async () => {
    for (let i = 0; i < 5; i++) {
      const { data: { session } } = await sb.auth.getSession();
      if (session) { await init(session); return; }
      await new Promise(r => setTimeout(r, 400 * (i + 1)));
    }
    window.location.href = 'index.html';
  })();
</script>
</body>
</html>
