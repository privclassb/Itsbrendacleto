<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Materiais | itsbrendacleto</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #FAF7F2; --sand: #EDE8DF; --brown: #5C4033; --brown-light: #8B6355; --mint: #A8C5B5; --rose: #E8A598; --text: #2C1F1A; --muted: #7A6560; --white: #FFFFFF; --radius: 16px; --shadow: 0 2px 16px rgba(92,64,51,0.08); }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; }
    header { background: var(--brown); padding: 16px 28px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
    .btn-back { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 6px 14px; font-size: 13px; color: var(--white); text-decoration: none; transition: all 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.25); }
    .header-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--white); font-weight: 400; }

    .hero { background: var(--white); border-bottom: 1px solid var(--sand); padding: 32px 28px; }
    .hero-inner { max-width: 680px; margin: 0 auto; }
    .hero-label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
    .hero-title { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); font-weight: 400; }

    main { max-width: 680px; margin: 0 auto; padding: 28px 20px; }

    .section-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); font-weight: 400; margin-bottom: 14px; margin-top: 24px; }
    .section-title:first-child { margin-top: 0; }

    .material-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 1.5px solid var(--sand);
    }
    .material-item:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(92,64,51,0.12); border-color: var(--brown-light); }
    .material-item.unavailable { opacity: 0.5; pointer-events: none; }

    .material-icon { width: 42px; height: 42px; border-radius: 10px; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .material-info { flex: 1; }
    .material-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .material-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .material-arrow { font-size: 18px; color: var(--sand); }

    .loading-card { text-align: center; padding: 40px; color: var(--muted); }
  </style>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5C4033" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="itsbrendacleto" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          setInterval(function () { reg.update(); }, 60000);
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible') reg.update();
          });
        }).catch(function () {});
      });
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        var active = document.activeElement;
        var isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
        if (isTyping) {
          active.addEventListener('blur', function () { window.location.reload(); }, { once: true });
        } else {
          window.location.reload();
        }
      });
    }
  </script>
</head>
<body>

<header>
  <a href="home-adulto.html" class="btn-back">← Voltar</a>
  <div class="header-title">Materiais</div>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-label">Sua área de recursos</div>
    <div class="hero-title">Materiais & Conteúdos 📚</div>
  </div>
</div>

<main>
  <div id="mainContent"><div class="loading-card">Carregando...</div></div>
</main>

<script>
  const SUPABASE_URL = 'https://vbqumpzlxseakvmyvkem.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NjK_Rdqnl1ZCRd9LlUG-fA_OvdYsKvj';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      storage: window.localStorage,
      autoRefreshToken: true,
      detectSessionInUrl: false,
      lock: async (_name, _acquireTimeout, fn) => fn(),
    }
  });

  // ---- Modo "Ver como aluno" (Brenda) -- so leitura, nao grava nada ----
  var __previewAs = sessionStorage.getItem('__preview_as');
  if (__previewAs) {
    var __origGetSession = sb.auth.getSession.bind(sb.auth);
    sb.auth.getSession = async function () {
      var real = await __origGetSession();
      if (real && real.data && real.data.session) {
        real.data.session = Object.assign({}, real.data.session, {
          user: Object.assign({}, real.data.session.user, { id: __previewAs })
        });
      }
      return real;
    };
    var __previewNoop = function () {
      var p = new Proxy(function () {}, {
        get: function (t, prop) {
          if (prop === 'then') return function (resolve) { resolve({ data: null, error: null, count: 0 }); };
          return function () { return p; };
        }
      });
      return p;
    };
    var __origFrom = sb.from.bind(sb);
    sb.from = function (table) {
      var qb = __origFrom(table);
      ['insert', 'update', 'upsert', 'delete'].forEach(function (m) {
        qb[m] = function () { return __previewNoop(); };
      });
      return qb;
    };
    if (sb.rpc) sb.rpc = function () { return __previewNoop(); };
    var __insertPreviewBanner = function () {
      if (document.getElementById('previewModeBanner')) return;
      var banner = document.createElement('div');
      banner.id = 'previewModeBanner';
      banner.style.cssText = 'position:relative;z-index:9999;background:#2C1F1A;color:#FFEFD6;padding:9px 16px;font-size:13px;text-align:center;font-family:"DM Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;';
      var previewName = sessionStorage.getItem('__preview_name') || 'aluno';
      banner.innerHTML = '\uD83D\uDD0D Modo visualiza\u00e7\u00e3o \u2014 voc\u00ea \u00e9 a Brenda vendo como <b>' + previewName + '</b> (somente leitura, nada \u00e9 salvo) ' +
        '<button id="previewExitBtn" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);color:#fff;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;font-family:inherit;">Sair da visualiza\u00e7\u00e3o</button>';
      document.body.insertBefore(banner, document.body.firstChild);
    };
    if (document.body) { __insertPreviewBanner(); } else { document.addEventListener('DOMContentLoaded', __insertPreviewBanner); }
    document.addEventListener('click', function (e) {
      if (e.target && e.target.id === 'previewExitBtn') {
        sessionStorage.removeItem('__preview_as');
        sessionStorage.removeItem('__preview_name');
        window.location.href = 'painel-professora.html';
      }
    });
  }

  const GLOBAL_CATEGORIES = [
    { key: 'adulto-materiais',    icon: '📖', label: 'Material digital',   sub: 'Slides e atividades' },
    { key: 'adulto-auloes',       icon: '🎓', label: 'Aulões',              sub: 'Aulas especiais extras' },
    { key: 'adulto-lexi',         icon: '🤖', label: 'Lexi — IA exclusiva', sub: 'Tire dúvidas e pratique inglês' },
  ];

  let userId = null;

  async function init(session) {
    // Session already verified before init()
    userId = session.user.id;

    // Busca links globais
    const { data: links } = await sb.from('material_links')
      .select('*').in('category', GLOBAL_CATEGORIES.map(c => c.key));
    const linkMap = {};
    (links || []).forEach(l => { linkMap[l.category] = l.url; });

    // Busca subpastas do aluno (individuais + as da turma dele, se tiver)
    const { data: profile } = await sb.from('profiles').select('turma_id').eq('id', userId).maybeSingle();
    let foldersQuery = sb.from('student_folders').select('*').order('created_at');
    foldersQuery = profile?.turma_id
      ? foldersQuery.or(`student_id.eq.${userId},turma_id.eq.${profile.turma_id}`)
      : foldersQuery.eq('student_id', userId);
    const { data: folders } = await foldersQuery;

    renderAll(linkMap, folders || []);
  }

  function renderAll(linkMap, folders) {
    const main = document.getElementById('mainContent');
    let html = '';

    // Links globais
    html += '<div class="section-title">Recursos</div>';
    GLOBAL_CATEGORIES.forEach(cat => {
      const url = linkMap[cat.key];
      const hasUrl = url && url.trim() !== '';
      html += `
        <a href="${hasUrl ? url : '#'}" target="${hasUrl ? '_blank' : '_self'}"
           class="material-item ${!hasUrl ? 'unavailable' : ''}">
          <div class="material-icon">${cat.icon}</div>
          <div class="material-info">
            <div class="material-title">${cat.label}</div>
            <div class="material-sub">${hasUrl ? cat.sub : 'Em breve...'}</div>
          </div>
          <div class="material-arrow">${hasUrl ? '›' : '⏳'}</div>
        </a>`;
    });

    // Subpastas do aluno (gravações, materiais extras, etc. definidos pela professora)
    if (folders.length > 0) {
      html += '<div class="section-title">Suas pastas</div>';
      folders.forEach(f => {
        const icon = /grava/i.test(f.label) ? '🎥' : '📂';
        html += `
          <a href="${f.url}" target="_blank" class="material-item">
            <div class="material-icon">${icon}</div>
            <div class="material-info">
              <div class="material-title">${f.label}</div>
              <div class="material-sub">Assista/acesse quando quiser</div>
            </div>
            <div class="material-arrow">›</div>
          </a>`;
      });
    }

    main.innerHTML = html;
  }

  // Auth with retry for slow session loading
  (async () => {
    for (let i = 0; i < 5; i++) {
      const { data: { session } } = await sb.auth.getSession();
      if (session) { await init(session); return; }
      await new Promise(r => setTimeout(r, 400 * (i + 1)));
    }
    window.location.href = 'index.html';
  })();
</script>
</body>
</html>
