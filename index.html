<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>itsbrendacleto — Inglês para a Vida Real</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF7F2;
      --sand: #EDE8DF;
      --brown: #5C4033;
      --brown-light: #8B6355;
      --mint: #A8C5B5;
      --rose: #E8A598;
      --text: #2C1F1A;
      --text-muted: #7A6560;
      --white: #FFFFFF;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(92,64,51,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Decorative background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(168,197,181,0.35) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -100px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(232,165,152,0.25) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--brown);
      letter-spacing: -0.5px;
      display: block;
    }

    .brand-tagline {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .divider-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 auto 32px;
      justify-content: center;
    }
    .divider-dot span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--mint);
      display: inline-block;
    }
    .divider-dot span:nth-child(2) { background: var(--rose); }
    .divider-dot span:nth-child(3) { background: var(--brown-light); opacity: 0.4; }

    h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 400;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--sand);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--cream);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--mint);
      box-shadow: 0 0 0 3px rgba(168,197,181,0.2);
      background: var(--white);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--brown);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }

    .btn-primary:hover { background: var(--brown-light); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--sand);
    }

    .btn-google {
      width: 100%;
      padding: 13px;
      background: var(--white);
      color: var(--text);
      border: 1.5px solid var(--sand);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-google:hover {
      background: var(--cream);
      border-color: var(--brown-light);
    }

    .google-icon {
      width: 18px; height: 18px;
    }

    .toggle-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .toggle-link a {
      color: var(--brown);
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .toggle-link a:hover { text-decoration: underline; }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .message.error {
      background: #FFF0EE;
      color: #C0392B;
      border: 1px solid #F5C6C2;
      display: block;
    }

    .message.success {
      background: #EFF7F3;
      color: #1E7E4A;
      border: 1px solid #B8DEC9;
      display: block;
    }

    .loading {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Forgot password */
    .forgot {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 16px;
    }
    .forgot a {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
    }
    .forgot a:hover { color: var(--brown); }

    /* Profile picker */
    .profile-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--cream);
      border: 1.5px solid var(--sand);
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 12px;
    }
    .profile-option:hover { background: var(--white); border-color: var(--mint); }
    .profile-option-icon { font-size: 24px; flex-shrink: 0; }
    .profile-option-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .profile-option-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  </style>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5C4033" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="itsbrendacleto" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="brand-name">itsbrendacleto</span>
    <span class="brand-tagline">Inglês para a Vida Real</span>
  </div>

  <div class="divider-dot">
    <span></span><span></span><span></span>
  </div>

  <div id="message" class="message"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <h2>Bem-vindo(a) de volta</h2>
    <p class="subtitle">Acesse sua conta para continuar aprendendo.</p>

    <div class="form-group">
      <label for="loginEmail">E-mail</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com" />
    </div>

    <div class="form-group">
      <label for="loginPassword">Senha</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
    </div>

    <div class="forgot">
      <a id="forgotLink">Esqueci minha senha</a>
    </div>

    <button class="btn-primary" id="loginBtn">Entrar</button>
  </div>

  <!-- FORGOT PASSWORD FORM -->
  <div id="forgotForm" style="display:none;">
    <h2>Recuperar senha</h2>
    <p class="subtitle">Enviaremos um link para seu e-mail.</p>

    <div class="form-group">
      <label for="forgotEmail">E-mail</label>
      <input type="email" id="forgotEmail" placeholder="seu@email.com" />
    </div>

    <button class="btn-primary" id="forgotBtn">Enviar link</button>

    <div class="toggle-link">
      Lembrou a senha? <a id="goToLoginFromForgot">Voltar</a>
    </div>
  </div>

  <!-- PROFILE PICKER -->
  <div id="pickerForm" style="display:none;">
    <h2>Qual perfil você quer acessar?</h2>
    <p class="subtitle">Essa conta tem mais de um perfil vinculado.</p>
    <div id="pickerOptions"></div>
  </div>
</div>

<script>
  // ─── Supabase config ───────────────────────────────────────────────
  const SUPABASE_URL = 'https://vbqumpzlxseakvmyvkem.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NjK_Rdqnl1ZCRd9LlUG-fA_OvdYsKvj';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ─── DOM refs ──────────────────────────────────────────────────────
  const loginForm    = document.getElementById('loginForm');
  const forgotForm   = document.getElementById('forgotForm');
  const pickerForm    = document.getElementById('pickerForm');
  const msgBox       = document.getElementById('message');

  function showMsg(text, type) {
    msgBox.textContent = text;
    msgBox.className = 'message ' + type;
  }

  function clearMsg() {
    msgBox.className = 'message';
    msgBox.textContent = '';
  }

  function showForm(form) {
    clearMsg();
    loginForm.style.display    = 'none';
    forgotForm.style.display   = 'none';
    pickerForm.style.display   = 'none';
    form.style.display         = 'block';
  }

  // ─── Navigation ────────────────────────────────────────────────────
  document.getElementById('forgotLink').addEventListener('click', () => showForm(forgotForm));
  document.getElementById('goToLoginFromForgot').addEventListener('click', () => showForm(loginForm));

  // ─── Login ─────────────────────────────────────────────────────────
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');

    if (!email || !password) { showMsg('Preencha e-mail e senha.', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>Entrando...';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      showMsg('E-mail ou senha incorretos. Tente novamente.', 'error');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    await redirect(data.user);
  });

  // ─── Forgot password ───────────────────────────────────────────────
  document.getElementById('forgotBtn').addEventListener('click', async () => {
    const email = document.getElementById('forgotEmail').value.trim();
    const btn   = document.getElementById('forgotBtn');

    if (!email) { showMsg('Digite seu e-mail.', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>Enviando...';

    const { error } = await sb.auth.resetPasswordForEmail(email);

    if (error) {
      showMsg('Erro ao enviar e-mail. Tente novamente.', 'error');
    } else {
      showMsg('Link enviado! Verifique seu e-mail.', 'success');
    }

    btn.disabled = false;
    btn.textContent = 'Enviar link';
  });

  // ─── Redirect by role ──────────────────────────────────────────────
  const ROLE_DESTINATION = {
    professora: 'painel-professora.html',
    kids: 'home-kids.html',
    responsavel: 'painel-responsavel.html'
  };
  const ROLE_LABEL = {
    professora: 'Painel da professora',
    kids: 'Minha área',
    adulto: 'Minha área'
  };

  async function redirect(user) {
    // Busca o perfil no banco (precisamos do guardian_of, não só do role)
    let profile = null;
    for (let i = 0; i < 3; i++) {
      const { data } = await sb.from('profiles').select('role, full_name, guardian_of').eq('id', user.id).maybeSingle();
      if (data) { profile = data; break; }
      await new Promise(r => setTimeout(r, 600));
    }

    const role = profile?.role || user.user_metadata?.role || 'adulto';
    console.log('Role final:', role, '| metadata:', user.user_metadata);

    const ownDestination = ROLE_DESTINATION[role] || 'home-adulto.html';

    // Se a conta tem um aluno vinculado como responsável (além do próprio perfil),
    // deixa a pessoa escolher qual perfil quer acessar.
    if (profile?.guardian_of && role !== 'responsavel') {
      const { data: linkedStudent } = await sb.from('profiles').select('full_name').eq('id', profile.guardian_of).maybeSingle();
      showProfilePicker(role, ownDestination, linkedStudent?.full_name || 'aluno(a) vinculado(a)');
      return;
    }

    window.location.href = ownDestination;
  }

  function showProfilePicker(role, ownDestination, studentName) {
    const ownLabel = ROLE_LABEL[role] || 'Minha área';
    document.getElementById('pickerOptions').innerHTML = `
      <button type="button" class="profile-option" data-href="${ownDestination}">
        <span class="profile-option-icon">👤</span>
        <span>
          <span class="profile-option-title">${ownLabel}</span>
          <span class="profile-option-sub">Acessar minha própria conta</span>
        </span>
      </button>
      <button type="button" class="profile-option" data-href="painel-responsavel.html">
        <span class="profile-option-icon">👶</span>
        <span>
          <span class="profile-option-title">Área de responsável</span>
          <span class="profile-option-sub">Acompanhar ${studentName}</span>
        </span>
      </button>
    `;
    document.querySelectorAll('#pickerOptions .profile-option').forEach(btn => {
      btn.addEventListener('click', () => { window.location.href = btn.dataset.href; });
    });
    showForm(pickerForm);
  }

  // Escuta login bem-sucedido
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      await redirect(session.user);
    }
  });

  // Link "Trocar perfil" (vindo de outra página) reaproveita uma sessão já ativa
  (async () => {
    if (new URLSearchParams(window.location.search).get('switch') !== '1') return;
    const { data: { session } } = await sb.auth.getSession();
    if (session) await redirect(session.user);
  })();
</script>
</body>
</html>
