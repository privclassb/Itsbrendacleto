<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Materiais | itsbrendacleto Kids</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --rose: #F9A8C9; --mint: #7ECBA1; --lavender: #C3B1E1; --yellow: #FFD97D; --sky: #90C9F9; --cream: #FFF8F0; --text: #3D2B1F; --white: #FFFFFF; --radius: 20px; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); min-height: 100vh; }
    header { background: var(--white); padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 10; }
    .btn-back { background: var(--cream); border: 2px solid #EEE; border-radius: 12px; padding: 7px 14px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; color: var(--text); text-decoration: none; transition: all 0.2s; }
    .btn-back:hover { border-color: var(--rose); }
    .header-title { font-size: 16px; font-weight: 900; color: var(--text); }

    .hero { background: linear-gradient(135deg, #7ECBA1, #C3B1E1); padding: 28px 24px; text-align: center; }
    .hero-icon { font-size: 48px; margin-bottom: 8px; }
    .hero-title { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
    .hero-sub { font-size: 13px; font-weight: 700; color: rgba(61,43,31,0.65); }

    main { padding: 24px 20px; max-width: 600px; margin: 0 auto; }

    .material-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 3px solid transparent;
    }
    .material-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.10); }
    .material-card.mint { border-color: var(--mint); }
    .material-card.rose { border-color: var(--rose); }
    .material-card.yellow { border-color: var(--yellow); }
    .material-card.lavender { border-color: var(--lavender); }

    .material-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .material-icon.mint { background: #F0FFF7; }
    .material-icon.rose { background: #FFF0F7; }
    .material-icon.yellow { background: #FFFBF0; }
    .material-icon.lavender { background: #F5F0FF; }

    .material-info { flex: 1; }
    .material-title { font-size: 15px; font-weight: 900; color: var(--text); margin-bottom: 2px; }
    .material-sub { font-size: 12px; font-weight: 600; color: #AAA; }
    .material-arrow { font-size: 20px; color: #DDD; }

    .unavailable {
      opacity: 0.5;
      pointer-events: none;
      cursor: default;
    }
    .coming-tag {
      background: #F0F0F0;
      border-radius: 99px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 800;
      color: #AAA;
      text-transform: uppercase;
    }

    .loading-card { text-align: center; padding: 40px; color: #AAA; font-weight: 700; }
  </style>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5C4033" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="itsbrendacleto" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          setInterval(function () { reg.update(); }, 60000);
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible') reg.update();
          });
        }).catch(function () {});
      });
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        var active = document.activeElement;
        var isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
        if (isTyping) {
          active.addEventListener('blur', function () { window.location.reload(); }, { once: true });
        } else {
          window.location.reload();
        }
      });
    }
  </script>
</head>
<body>

<header>
  <a href="home-kids.html" class="btn-back">← Voltar</a>
  <div class="header-title">📁 Materiais</div>
</header>

<div class="hero">
  <div class="hero-icon">📚</div>
  <div class="hero-title">Seus Materiais</div>
  <div class="hero-sub">Tudo que você precisa para aprender!</div>
</div>

<main id="mainContent">
  <div class="loading-card">Carregando...</div>
</main>

<script>
  const SUPABASE_URL = 'https://vbqumpzlxseakvmyvkem.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NjK_Rdqnl1ZCRd9LlUG-fA_OvdYsKvj';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      storage: window.localStorage,
      autoRefreshToken: true,
      detectSessionInUrl: false,
      lock: async (_name, _acquireTimeout, fn) => fn(),
    }
  });

  // ---- Modo "Ver como aluno" (Brenda) -- so leitura, nao grava nada ----
  var __previewAs = sessionStorage.getItem('__preview_as');
  if (__previewAs) {
    var __origGetSession = sb.auth.getSession.bind(sb.auth);
    sb.auth.getSession = async function () {
      var real = await __origGetSession();
      if (real && real.data && real.data.session) {
        real.data.session = Object.assign({}, real.data.session, {
          user: Object.assign({}, real.data.session.user, { id: __previewAs })
        });
      }
      return real;
    };
    var __previewNoop = function () {
      var p = new Proxy(function () {}, {
        get: function (t, prop) {
          if (prop === 'then') return function (resolve) { resolve({ data: null, error: null, count: 0 }); };
          return function () { return p; };
        }
      });
      return p;
    };
    var __origFrom = sb.from.bind(sb);
    sb.from = function (table) {
      var qb = __origFrom(table);
      ['insert', 'update', 'upsert', 'delete'].forEach(function (m) {
        qb[m] = function () { return __previewNoop(); };
      });
      return qb;
    };
    if (sb.rpc) sb.rpc = function () { return __previewNoop(); };
    var __insertPreviewBanner = function () {
      if (document.getElementById('previewModeBanner')) return;
      var banner = document.createElement('div');
      banner.id = 'previewModeBanner';
      banner.style.cssText = 'position:relative;z-index:9999;background:#2C1F1A;color:#FFEFD6;padding:9px 16px;font-size:13px;text-align:center;font-family:"DM Sans",sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;';
      var previewName = sessionStorage.getItem('__preview_name') || 'aluno';
      banner.innerHTML = '\uD83D\uDD0D Modo visualiza\u00e7\u00e3o \u2014 voc\u00ea \u00e9 a Brenda vendo como <b>' + previewName + '</b> (somente leitura, nada \u00e9 salvo) ' +
        '<button id="previewExitBtn" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);color:#fff;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;font-family:inherit;">Sair da visualiza\u00e7\u00e3o</button>';
      document.body.insertBefore(banner, document.body.firstChild);
    };
    if (document.body) { __insertPreviewBanner(); } else { document.addEventListener('DOMContentLoaded', __insertPreviewBanner); }
    document.addEventListener('click', function (e) {
      if (e.target && e.target.id === 'previewExitBtn') {
        sessionStorage.removeItem('__preview_as');
        sessionStorage.removeItem('__preview_name');
        window.location.href = 'painel-professora.html';
      }
    });
  }

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    const studentId = session.user.id;

    const { data: links } = await sb.from('material_links').select('*').eq('category', 'kids-materiais');
    const materialUrl = links && links[0] ? links[0].url : null;

    const { data: profile } = await sb.from('profiles').select('turma_id').eq('id', studentId).maybeSingle();
    let foldersQuery = sb.from('student_folders').select('*');
    foldersQuery = profile?.turma_id
      ? foldersQuery.or(`student_id.eq.${studentId},turma_id.eq.${profile.turma_id}`)
      : foldersQuery.eq('student_id', studentId);
    const { data: folders } = await foldersQuery;

    const main = document.getElementById('mainContent');

    const materialCard = `
      <a href="${materialUrl || '#'}" target="${materialUrl ? '_blank' : '_self'}"
         class="material-card mint ${!materialUrl ? 'unavailable' : ''}">
        <div class="material-icon mint">📖</div>
        <div class="material-info">
          <div class="material-title">Material digital</div>
          <div class="material-sub">${materialUrl ? 'Slides e atividades' : 'Em breve...'}</div>
        </div>
        <div class="material-arrow">${materialUrl ? '›' : '⏳'}</div>
      </a>`;

    const gravacoesHtml = (folders && folders.length > 0)
      ? folders.map(f => `
        <a href="${f.url}" target="_blank" class="material-card rose">
          <div class="material-icon rose">🎥</div>
          <div class="material-info">
            <div class="material-title">${f.label || 'Gravação das aulas'}</div>
            <div class="material-sub">Assista quando quiser</div>
          </div>
          <div class="material-arrow">›</div>
        </a>`).join('')
      : `
        <div class="material-card rose unavailable">
          <div class="material-icon rose">🎥</div>
          <div class="material-info">
            <div class="material-title">Gravações das aulas</div>
            <div class="material-sub">Em breve...</div>
          </div>
          <div class="material-arrow">⏳</div>
        </div>`;

    main.innerHTML = materialCard + gravacoesHtml;
  }

  // Auth with retry for slow session loading
  (async () => {
    for (let i = 0; i < 5; i++) {
      const { data: { session } } = await sb.auth.getSession();
      if (session) { await init(); return; }
      await new Promise(r => setTimeout(r, 400 * (i + 1)));
    }
    window.location.href = 'index.html';
  })();
</script>
</body>
</html>
