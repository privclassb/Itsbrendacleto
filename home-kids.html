<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home | itsbrendacleto Kids</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --rose: #F9A8C9; --mint: #7ECBA1; --lavender: #C3B1E1; --yellow: #FFD97D; --sky: #90C9F9; --cream: #FFF8F0; --text: #3D2B1F; --white: #FFFFFF; --radius: 20px; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); min-height: 100vh; }

    header { background: var(--white); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 10; }
    .header-brand { font-size: 17px; font-weight: 900; color: var(--text); }
    .header-brand span { color: var(--rose); }
    .btn-logout { background: none; border: 2px solid #EEE; border-radius: 10px; padding: 6px 12px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: #999; cursor: pointer; }

    .hero { background: linear-gradient(135deg, #FFD97D 0%, #F9A8C9 55%, #C3B1E1 100%); padding: 32px 24px 28px; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: '⭐🌟✨'; position: absolute; top: 12px; left: 12px; font-size: 18px; opacity: 0.35; letter-spacing: 6px; }
    .hero::after { content: '🎉🎊🎈'; position: absolute; bottom: 12px; right: 12px; font-size: 18px; opacity: 0.35; letter-spacing: 6px; }

    /* Avatar */
    .avatar-wrap { position: relative; width: 72px; height: 72px; margin: 0 auto 12px; }
    .avatar-img { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 4px solid rgba(255,255,255,0.6); display: none; }
    .avatar-placeholder { width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 36px; border: 4px solid rgba(255,255,255,0.6); }
    .avatar-edit { position: absolute; bottom: 0; right: 0; width: 24px; height: 24px; background: var(--rose); border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; color: white; }
    #avatarInput { display: none; }

    .hero-greeting { font-size: 13px; font-weight: 800; color: rgba(61,43,31,0.65); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .hero-name { font-size: 28px; font-weight: 900; color: var(--text); margin-bottom: 12px; }
    .hero-chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .hero-chip { background: rgba(255,255,255,0.55); border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 5px; }

    main { padding: 20px; max-width: 600px; margin: 0 auto; }

    /* Teacher */
    .teacher-card { background: linear-gradient(135deg, #C3B1E1, #90C9F9); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
    .teacher-avatar-wrap { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; overflow: hidden; }
    .teacher-avatar-img { width: 48px; height: 48px; object-fit: cover; border-radius: 50%; display: none; }
    .teacher-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: rgba(61,43,31,0.55); margin-bottom: 2px; }
    .teacher-name { font-size: 16px; font-weight: 900; color: var(--text); }

    /* Menu 3 colunas */
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .menu-card { position: relative; background: var(--white); border-radius: 16px; padding: 16px 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent; text-align: center; }
    .menu-badge { position: absolute; top: -6px; right: -6px; background: #E8555F; color: white; font-size: 11px; font-weight: 800; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .menu-card.c-rose { border-color: var(--rose); }
    .menu-card.c-mint { border-color: var(--mint); }
    .menu-card.c-yellow { border-color: var(--yellow); }
    .menu-card.c-lavender { border-color: var(--lavender); }
    .menu-card.c-sky { border-color: var(--sky); }
    .menu-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .menu-icon.rose { background: #FFF0F7; }
    .menu-icon.mint { background: #F0FFF7; }
    .menu-icon.yellow { background: #FFFBF0; }
    .menu-icon.lavender { background: #F5F0FF; }
    .menu-icon.sky { background: #F0F8FF; }
    .menu-title { font-size: 12px; font-weight: 900; color: var(--text); }

    /* Progress */
    .progress-card { background: var(--white); border-radius: var(--radius); padding: 18px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .progress-label { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 10px; display: flex; justify-content: space-between; }
    .progress-bar { height: 12px; background: #F0F0F0; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--mint), var(--sky)); border-radius: 99px; transition: width 0.8s ease; }
    .agenda-card { background: var(--white); border-radius: var(--radius); padding: 18px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 18px; }
    .agenda-title { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
    .agenda-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #F0F0F0; font-size: 13px; }
    .agenda-row:last-child { border-bottom: none; }
    .agenda-date { font-weight: 700; color: var(--text); text-transform: capitalize; }
    .agenda-status { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; flex-shrink: 0; }
    .agenda-status.pendente { background: #F0F0F0; color: #888; }
    .agenda-status.realizada { background: #E8F8EF; color: #1E5C3A; }
    .agenda-status.cancelada, .agenda-status.cancelada_falta { background: #FFF0EE; color: #C0392B; }
    .agenda-status.reagendada { background: #FFF8E5; color: #A9740C; }
  </style>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5C4033" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="itsbrendacleto" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</head>
<body>

<header>
  <div class="header-brand">its<span>brenda</span>cleto</div>
  <button class="btn-logout" id="logoutBtn">Sair</button>
</header>

<div class="hero">
  <div class="avatar-wrap">
    <div class="avatar-placeholder" id="avatarPlaceholder">👤</div>
    <img class="avatar-img" id="avatarImg" />
    <label for="avatarInput" class="avatar-edit">✏️</label>
    <input type="file" id="avatarInput" accept="image/*" />
  </div>
  <div class="hero-greeting">Hello!</div>
  <div class="hero-name" id="heroName">...</div>
  <div class="hero-chips">
    <div class="hero-chip">🗺️ <span id="heroMission">Mission 1</span></div>
    <div class="hero-chip">🔥 <span id="heroStreak">0</span> dias</div>
    <div class="hero-chip">✅ <span id="heroAulas">0</span> aulas</div>
  </div>
</div>

<main>
  <div class="teacher-card">
    <div class="teacher-avatar-wrap" id="teacherAvatarWrap">
      <span id="teacherEmoji">👩‍🏫</span>
      <img class="teacher-avatar-img" id="teacherAvatarImg" />
    </div>
    <div>
      <div class="teacher-label">Sua professora</div>
      <div class="teacher-name" id="teacherName">...</div>
    </div>
  </div>

  <div class="agenda-card" id="agendaCard" style="display:none;">
    <div class="agenda-title">📅 Próximas aulas</div>
    <div id="agendaList"></div>
    <a href="agenda-kids.html" style="display:block;text-align:center;margin-top:8px;font-size:12px;font-weight:800;color:var(--text);text-decoration:none;">Ver agenda completa →</a>
  </div>

  <div class="menu-grid">
    <a href="dashboard-kids.html" class="menu-card c-rose">
      <div class="menu-icon rose">🎯</div>
      <div class="menu-title">Atividades</div>
    </a>
    <a href="materiais-kids.html" class="menu-card c-mint">
      <div class="menu-icon mint">📁</div>
      <div class="menu-title">Materiais</div>
    </a>
    <a href="conquistas-kids.html" class="menu-card c-yellow">
      <div class="menu-icon yellow">🏆</div>
      <div class="menu-title">Conquistas</div>
    </a>
    <a href="frase-kids.html" class="menu-card c-lavender">
      <div class="menu-icon lavender">💬</div>
      <div class="menu-title">Palavra do dia</div>
    </a>
    <a href="dicionario.html" class="menu-card c-sky">
      <div class="menu-icon sky">📖</div>
      <div class="menu-title">Dicionário</div>
    </a>
    <a href="agenda-kids.html" class="menu-card c-rose">
      <div class="menu-icon rose">📅</div>
      <div class="menu-title">Agenda</div>
    </a>
  </div>

  <div class="progress-card">
    <div class="progress-label">
      <span>Progresso geral</span>
      <span id="progressText">0 aulas</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
</main>

<script>
  const SURL = 'https://vbqumpzlxseakvmyvkem.supabase.co';
  const SKEY = 'sb_publishable_NjK_Rdqnl1ZCRd9LlUG-fA_OvdYsKvj';
  const sb = supabase.createClient(SURL, SKEY, {
    auth: {
      persistSession: true,
      storage: window.localStorage,
      autoRefreshToken: true,
      detectSessionInUrl: false,
      lock: async (_name, _acquireTimeout, fn) => fn(),
    }
  });

  async function init(session) {
    // Session already verified before init()
    const user = session.user;

    const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    if (profile?.role === 'professora') { window.location.href = 'painel-professora.html'; return; }
    if (profile?.role === 'adulto') { window.location.href = 'home-adulto.html'; return; }

    const name = profile?.full_name || user.email.split('@')[0];
    const mission = profile?.level || 1;
    document.getElementById('heroName').textContent = name + '! 👋';
    document.getElementById('heroMission').textContent = 'Mission ' + mission;

    // Aulas
    const { data: progress } = await sb.from('lesson_progress').select('lesson_id').eq('user_id', user.id).like('lesson_id', 'kids-m%');
    const completed = (progress || []).filter(function(p) { return p.lesson_id.match(/^kids-m\d+-a\d+$/); });
    document.getElementById('heroAulas').textContent = completed.length;
    document.getElementById('progressText').textContent = completed.length + ' aulas';
    document.getElementById('progressFill').style.width = (completed.length / 2 * 100) + '%';

    // Streak
    const { data: streak } = await sb.from('streaks').select('current_streak').eq('user_id', user.id).maybeSingle();
    document.getElementById('heroStreak').textContent = streak?.current_streak || 0;
    await updateStreak(user.id);

    // Avatar do aluno
    if (profile?.avatar_url) showAvatar(profile.avatar_url);

    // Próximas aulas
    await loadAgenda(user.id, profile?.turma_id);

    // Foto da professora
    if (profile?.teacher_id) {
      const { data: teacher } = await sb.from('profiles').select('full_name, avatar_url').eq('id', profile.teacher_id).maybeSingle();
      if (teacher?.full_name) document.getElementById('teacherName').textContent = teacher.full_name;
      if (teacher?.avatar_url) {
        document.getElementById('teacherAvatarImg').src = teacher.avatar_url + '?t=' + Date.now();
        document.getElementById('teacherAvatarImg').style.display = 'block';
        document.getElementById('teacherEmoji').style.display = 'none';
      }
    } else {
      document.getElementById('teacherName').textContent = 'Nathalia Rozado';
    }
  }

  const CLASS_STATUS_LABEL = {
    realizada: 'Realizada', pendente: 'Pendente', cancelada: 'Cancelada',
    cancelada_falta: 'Cancelada por falta', reagendada: 'Reagendada'
  };

  async function loadAgenda(userId, turmaId) {
    const today = new Date().toISOString().slice(0, 10);
    let query = sb.from('class_logs').select('class_date, start_time, end_time, status')
      .gte('class_date', today).order('class_date', { ascending: true }).order('start_time', { ascending: true }).limit(5);
    query = turmaId ? query.or(`student_id.eq.${userId},turma_id.eq.${turmaId}`) : query.eq('student_id', userId);

    const { data: logs } = await query;
    const card = document.getElementById('agendaCard');
    if (!logs || logs.length === 0) { card.style.display = 'none'; return; }

    card.style.display = 'block';
    document.getElementById('agendaList').innerHTML = logs.map(l => {
      const date = new Date(l.class_date + 'T00:00:00').toLocaleDateString('pt-BR', { weekday: 'short', day: '2-digit', month: '2-digit' });
      const time = l.start_time ? l.start_time.slice(0, 5) + (l.end_time ? '–' + l.end_time.slice(0, 5) : '') : '';
      const statusLabel = CLASS_STATUS_LABEL[l.status] || l.status;
      return `
        <div class="agenda-row">
          <span class="agenda-date">${date}${time ? ' · ' + time : ''}</span>
          <span class="agenda-status ${l.status}">${statusLabel}</span>
        </div>`;
    }).join('');
  }

  function showAvatar(url) {
    document.getElementById('avatarImg').src = url + '?t=' + Date.now();
    document.getElementById('avatarImg').style.display = 'block';
    document.getElementById('avatarPlaceholder').style.display = 'none';
  }

  document.getElementById('avatarInput').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    const userId = session.user.id;
    try {
      const ext = file.name.split('.').pop().toLowerCase().replace(/[^a-z]/g, '') || 'jpg';
      const path = userId + '_' + Date.now() + '.' + ext;
      const { error: upErr } = await sb.storage.from('Avatars').upload(path, file, { upsert: true });
      if (upErr) { alert('Erro upload: ' + upErr.message); return; }
      const { data: urlData } = sb.storage.from('Avatars').getPublicUrl(path);
      const { error: updErr } = await sb.from('profiles').update({ avatar_url: urlData.publicUrl }).eq('id', userId);
      if (updErr) { alert('Erro ao salvar: ' + updErr.message); return; }
      showAvatar(urlData.publicUrl);
    } catch(err) { alert('Erro: ' + err.message); }
  });

  async function updateStreak(userId) {
    const today = new Date().toISOString().split('T')[0];
    const { data: s } = await sb.from('streaks').select('*').eq('user_id', userId).maybeSingle();
    if (!s) { await sb.from('streaks').insert({ user_id: userId, last_access: today, current_streak: 1 }); document.getElementById('heroStreak').textContent = 1; return; }
    const diff = Math.floor((new Date(today) - new Date(s.last_access)) / 86400000);
    if (diff === 0) return;
    const newS = diff === 1 ? s.current_streak + 1 : 1;
    await sb.from('streaks').update({ last_access: today, current_streak: newS }).eq('user_id', userId);
    document.getElementById('heroStreak').textContent = newS;
  }

  document.getElementById('logoutBtn').addEventListener('click', async function() {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  });

  // Auth with retry for slow session loading
  (async () => {
    for (let i = 0; i < 5; i++) {
      const { data: { session } } = await sb.auth.getSession();
      if (session) { await init(session); return; }
      await new Promise(r => setTimeout(r, 400 * (i + 1)));
    }
    window.location.href = 'index.html';
  })();
</script>
</body>
</html>
