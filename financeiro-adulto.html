<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro | itsbrendacleto</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #FAF7F2; --sand: #EDE8DF; --brown: #5C4033; --brown-light: #8B6355; --mint: #A8C5B5; --rose: #E8A598; --text: #2C1F1A; --muted: #7A6560; --white: #FFFFFF; --radius: 16px; --shadow: 0 2px 16px rgba(92,64,51,0.08); }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; }

    header { background: var(--brown); padding: 16px 28px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 10; }
    .btn-back { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--white); text-decoration: none; transition: all 0.2s; }
    .btn-back:hover { background: rgba(255,255,255,0.25); }
    .header-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--white); font-weight: 400; }

    .hero { background: var(--white); border-bottom: 1px solid var(--sand); padding: 32px 28px; }
    .hero-inner { max-width: 680px; margin: 0 auto; }
    .hero-label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
    .hero-title { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--text); font-weight: 400; }

    main { max-width: 680px; margin: 0 auto; padding: 28px 20px 60px; }

    .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .summary-card { background: var(--white); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); text-align: center; }
    .summary-value { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--brown); display: block; }
    .summary-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    .section-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); font-weight: 400; margin-bottom: 14px; }
    .card { background: var(--white); border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow); margin-bottom: 28px; }

    .pay-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--sand); }
    .pay-row:last-child { border-bottom: none; }
    .pay-info { flex: 1; min-width: 0; }
    .pay-desc { font-size: 14px; font-weight: 600; color: var(--text); }
    .pay-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .pay-amount { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--text); flex-shrink: 0; }
    .pay-status { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .pay-status.paid { background: #1E5C3A; color: white; }
    .pay-status.overdue { background: #C0392B; color: white; }
    .pay-status.pending { background: var(--sand); color: var(--muted); border: 1.5px solid #DDD4C7; }

    .empty-msg { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }

    /* Recibo de pagamento */
    .receipt-select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--sand); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--white); margin-bottom: 14px; }
    .btn-generate-receipt { width: 100%; padding: 12px; background: var(--brown); border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: white; cursor: pointer; }
    .btn-generate-receipt:hover { background: var(--brown-light); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .receipt-box { background: var(--white); border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .receipt-header { text-align: center; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1.5px solid var(--sand); }
    .receipt-company { font-size: 13px; font-weight: 700; color: var(--brown); letter-spacing: 1px; }
    .receipt-cnpj { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .receipt-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text); text-align: center; margin-bottom: 22px; }
    .receipt-amount { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--brown); text-align: center; margin-bottom: 22px; }
    .receipt-body { font-size: 14px; color: var(--text); line-height: 1.8; margin-bottom: 24px; }
    .receipt-meta { font-size: 13px; color: var(--muted); text-align: right; margin-bottom: 28px; }
    .receipt-signature { text-align: center; font-size: 13px; color: var(--text); }
    .receipt-signature-img { display: block; max-width: 200px; max-height: 55px; margin: 0 auto -6px; object-fit: contain; }
    .receipt-signature-line { border-top: 1.5px solid var(--text); width: 220px; margin: 0 auto 6px; padding-top: 6px; }
    .receipt-actions { display: flex; gap: 10px; margin-top: 24px; }
    .receipt-actions button { flex: 1; padding: 12px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .btn-receipt-print { background: var(--brown); color: white; }
    .btn-receipt-print:hover { background: var(--brown-light); }
    .btn-receipt-close { background: var(--sand); color: var(--text); }

    @media print {
      body * { visibility: hidden; }
      .receipt-box, .receipt-box * { visibility: visible; }
      .receipt-box { position: absolute; top: 0; left: 0; width: 100%; max-width: 100%; box-shadow: none; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>

<header>
  <a href="home-adulto.html" class="btn-back">← Voltar</a>
  <div class="header-title">Financeiro</div>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-label">Suas parcelas</div>
    <div class="hero-title">Financeiro 💳</div>
  </div>
</div>

<main>
  <div class="summary-row">
    <div class="summary-card">
      <span class="summary-value" id="summaryPaid">—</span>
      <div class="summary-label">Pagas</div>
    </div>
    <div class="summary-card">
      <span class="summary-value" id="summaryPending">—</span>
      <div class="summary-label">Em aberto</div>
    </div>
  </div>

  <div class="section-title">Histórico de pagamentos</div>
  <div class="card">
    <div id="paymentsList"><div class="empty-msg">Carregando...</div></div>
  </div>

  <div class="section-title">🧾 Recibo de pagamento</div>
  <div class="card">
    <div class="empty-msg" id="receiptEmptyMsg" style="display:none;">Nenhuma parcela paga encontrada ainda.</div>
    <div id="receiptFormWrap" style="display:none;">
      <select id="receiptMonthSelect" class="receipt-select"></select>
      <button class="btn-generate-receipt" onclick="openReceiptModal()">🧾 Gerar recibo</button>
    </div>
  </div>
</main>

<div class="modal-overlay" id="receiptModalOverlay">
  <div class="receipt-box">
    <div class="receipt-header">
      <div class="receipt-company">PRIV CLASS B</div>
      <div class="receipt-cnpj">CNPJ 43.151.392/0001-00</div>
    </div>
    <div class="receipt-title">Recibo</div>
    <div class="receipt-amount" id="receiptAmount"></div>
    <div class="receipt-body" id="receiptBody"></div>
    <div class="receipt-meta" id="receiptMeta"></div>
    <div class="receipt-signature">
      <img src="assets/assinatura-brenda.png" alt="Assinatura de Brenda Cleto" class="receipt-signature-img" />
      <div class="receipt-signature-line">Brenda Cleto</div>
      Priv Class B · CNPJ 43.151.392/0001-00
    </div>
    <div class="receipt-actions no-print">
      <button class="btn-receipt-close" onclick="closeReceiptModal()">Fechar</button>
      <button class="btn-receipt-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://vbqumpzlxseakvmyvkem.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_NjK_Rdqnl1ZCRd9LlUG-fA_OvdYsKvj';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      storage: window.localStorage,
      autoRefreshToken: true,
      detectSessionInUrl: false,
      lock: async (_name, _acquireTimeout, fn) => fn(),
    }
  });

  function todayLocalISO() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function renderPaymentsInto(listEl, summaryPaidEl, summaryPendingEl, payments) {
    if (!payments || payments.length === 0) {
      listEl.innerHTML = '<div class="empty-msg">Nenhum lançamento encontrado ainda.</div>';
      if (summaryPaidEl) summaryPaidEl.textContent = 'R$ 0,00';
      if (summaryPendingEl) summaryPendingEl.textContent = 'R$ 0,00';
      return;
    }

    const today = todayLocalISO();
    let totalPaid = 0, totalPending = 0;

    const sorted = [...payments].sort((a, b) => (b.due_date || '').localeCompare(a.due_date || ''));

    listEl.innerHTML = sorted.map(p => {
      const overdue = !p.paid && p.due_date && p.due_date < today;
      const statusClass = p.paid ? 'paid' : (overdue ? 'overdue' : 'pending');
      const icon = p.paid ? '✓' : (overdue ? '!' : '○');
      const dueDate = p.due_date ? new Date(p.due_date + 'T00:00:00').toLocaleDateString('pt-BR') : '—';
      const paidDate = p.paid_at ? new Date(p.paid_at + 'T00:00:00').toLocaleDateString('pt-BR') : null;
      const amount = 'R$ ' + Number(p.amount || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 });

      if (p.paid) totalPaid += Number(p.amount || 0);
      else totalPending += Number(p.amount || 0);

      return `
        <div class="pay-row">
          <div class="pay-status ${statusClass}">${icon}</div>
          <div class="pay-info">
            <div class="pay-desc">${p.description || 'Parcela mensal'}</div>
            <div class="pay-date">${p.paid ? 'Pago em ' + paidDate : (overdue ? 'Venceu em ' + dueDate : 'Vence em ' + dueDate)}</div>
          </div>
          <div class="pay-amount">${amount}</div>
        </div>`;
    }).join('');

    if (summaryPaidEl) summaryPaidEl.textContent = 'R$ ' + totalPaid.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    if (summaryPendingEl) summaryPendingEl.textContent = 'R$ ' + totalPending.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
  }

  async function init(session) {
    const user = session.user;
    const { data: profile } = await sb.from('profiles').select('full_name').eq('id', user.id).maybeSingle();
    const { data: payments } = await sb.from('payments').select('*').eq('student_id', user.id).eq('type', 'entrada');
    renderPaymentsInto(
      document.getElementById('paymentsList'),
      document.getElementById('summaryPaid'),
      document.getElementById('summaryPending'),
      payments
    );
    loadReceiptOptions(payments, (profile && profile.full_name) || user.email);
  }

  // ---- Recibo de pagamento ----

  let receiptPaymentsCache = [];
  let receiptPayerName = '';

  function loadReceiptOptions(payments, payerName) {
    receiptPayerName = payerName;
    receiptPaymentsCache = (payments || []).filter(p => p.paid).sort((a, b) => (b.due_date || '').localeCompare(a.due_date || ''));

    const emptyEl = document.getElementById('receiptEmptyMsg');
    const wrapEl = document.getElementById('receiptFormWrap');

    if (receiptPaymentsCache.length === 0) {
      emptyEl.style.display = 'block';
      wrapEl.style.display = 'none';
      return;
    }

    emptyEl.style.display = 'none';
    wrapEl.style.display = 'block';

    const sel = document.getElementById('receiptMonthSelect');
    sel.innerHTML = receiptPaymentsCache.map((p, i) => {
      const d = new Date((p.due_date || p.paid_at) + 'T00:00:00');
      let label = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
      label = label.charAt(0).toUpperCase() + label.slice(1);
      const amount = 'R$ ' + Number(p.amount || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 });
      return `<option value="${i}">${label} — ${amount}</option>`;
    }).join('');
  }

  function openReceiptModal() {
    const idx = parseInt(document.getElementById('receiptMonthSelect').value, 10);
    const p = receiptPaymentsCache[idx];
    if (!p) return;
    renderReceipt(p, receiptPayerName);
    document.getElementById('receiptModalOverlay').classList.add('open');
  }

  function closeReceiptModal() {
    document.getElementById('receiptModalOverlay').classList.remove('open');
  }

  function renderReceipt(p, payerName) {
    const refDate = new Date((p.due_date || p.paid_at) + 'T00:00:00');
    const refLabel = refDate.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    const paidDateStr = p.paid_at
      ? new Date(p.paid_at + 'T00:00:00').toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })
      : null;
    const issueDate = new Date(); // data em que a pessoa está solicitando o recibo no site
    const amount = Number(p.amount || 0);
    const amountStr = 'R$ ' + amount.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    const extenso = valorPorExtenso(amount);

    document.getElementById('receiptAmount').textContent = amountStr;
    document.getElementById('receiptBody').textContent =
      `Recebi de ${payerName} a importância de ${amountStr} (${extenso}), referente à parcela mensal de aulas de inglês do mês de ${refLabel}` +
      (paidDateStr ? `, paga em ${paidDateStr}.` : '.');
    document.getElementById('receiptMeta').textContent =
      'Recibo emitido em ' + issueDate.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  function valorPorExtenso(valor) {
    const unidades = ['zero','um','dois','três','quatro','cinco','seis','sete','oito','nove'];
    const dezA19 = ['dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
    const dezenas = ['','dez','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
    const centenas = ['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];

    function trioToWords(n) {
      if (n === 0) return '';
      if (n === 100) return 'cem';
      const parts = [];
      const c = Math.floor(n / 100);
      const r = n % 100;
      if (c > 0) parts.push(centenas[c]);
      if (r > 0) {
        if (r < 10) parts.push(unidades[r]);
        else if (r < 20) parts.push(dezA19[r - 10]);
        else {
          const d = Math.floor(r / 10);
          const u = r % 10;
          parts.push(u > 0 ? dezenas[d] + ' e ' + unidades[u] : dezenas[d]);
        }
      }
      return parts.join(' e ');
    }

    function integerToWords(n) {
      if (n === 0) return 'zero';
      let resto = n;
      const milhoes = Math.floor(resto / 1e6); resto %= 1e6;
      const milhares = Math.floor(resto / 1e3); resto %= 1e3;
      const parts = [];
      if (milhoes) parts.push(trioToWords(milhoes) + (milhoes === 1 ? ' milhão' : ' milhões'));
      if (milhares) parts.push(milhares === 1 ? 'mil' : trioToWords(milhares) + ' mil');
      if (resto) parts.push(trioToWords(resto));
      return parts.join(' e ');
    }

    const reais = Math.floor(valor);
    const centavos = Math.round((valor - reais) * 100);

    let result = integerToWords(reais) + (reais === 1 ? ' real' : ' reais');
    if (centavos > 0) {
      result += ' e ' + integerToWords(centavos) + (centavos === 1 ? ' centavo' : ' centavos');
    }
    return result;
  }

  (async () => {
    for (let i = 0; i < 5; i++) {
      const { data: { session } } = await sb.auth.getSession();
      if (session) { await init(session); return; }
      await new Promise(r => setTimeout(r, 400 * (i + 1)));
    }
    window.location.href = 'index.html';
  })();
</script>
</body>
</html>
